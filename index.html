<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <title>Inline Autocomplete</title>
    <style>
        :root {
            --bg: #f4f7f2;
            --ink: #102016;
            --muted: #496153;
            --card: rgba(255, 255, 255, 0.82);
            --border: #c7d6c9;
            --primary: #0f766e;
            --primary-strong: #0b5f58;
            --accent: #e68a00;
            --danger: #be123c;
            --radius-lg: 18px;
            --radius-md: 12px;
            --shadow: 0 18px 34px rgba(16, 32, 22, 0.12);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 14%, #ddeed9 0%, rgba(221, 238, 217, 0) 45%),
                radial-gradient(circle at 90% 0%, #f7debc 0%, rgba(247, 222, 188, 0) 40%),
                linear-gradient(180deg, #f9fbf7 0%, var(--bg) 100%);
            min-height: 100vh;
            padding: 28px;
            overflow-x: hidden;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.3;
        }
        body::before {
            left: -110px;
            bottom: -120px;
            background: #9ad4a6;
        }
        body::after {
            right: -90px;
            top: 34%;
            background: #f2b04d;
        }
        .app-shell {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 420px;
            gap: 24px;
            align-items: start;
        }
        .workspace {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 24px;
            backdrop-filter: blur(6px);
            animation: rise-in 0.45s ease;
        }
        h1 {
            margin: 0 0 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.8rem, 2.8vw, 2.5rem);
            letter-spacing: -0.02em;
        }
        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.98rem;
        }
        #editor {
            width: 100%;
            font-size: 1.06rem;
            line-height: 1.7;
            padding: 20px;
            white-space: pre-wrap;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            min-height: 500px;
            overflow-y: auto;
            resize: vertical;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        #editor:focus {
            outline: none;
            border-color: #7fb09a;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
        }
        #editor:empty::before {
            content: attr(placeholder);
            color: #7a8e80;
        }
        #ghost-span {
            color: #7b8f82;
            font-style: italic;
            display: inline;
        }
        #sidebar {
            position: sticky;
            top: 22px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            font-size: 14px;
            box-shadow: var(--shadow);
            max-height: calc(100vh - 44px);
            overflow-y: auto;
            backdrop-filter: blur(6px);
            animation: rise-in 0.55s ease;
        }
        .panel-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
            display: inline-block;
        }
        .muted-text {
            font-size: 12px;
            color: #526658;
            margin: 8px 0;
        }
        .divider {
            margin: 16px 0;
            border: 0;
            border-top: 1px solid var(--border);
        }
        .btn {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.01em;
            transition: transform 0.12s ease, filter 0.2s ease, opacity 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }
        .btn-neutral {
            background: #e8efe7;
            color: #1d3124;
            border: 1px solid #cad7ca;
        }
        .btn-primary {
            background: linear-gradient(120deg, var(--primary) 0%, var(--primary-strong) 100%);
            color: #fff;
        }
        .btn-accent {
            background: linear-gradient(120deg, #f39c12 0%, var(--accent) 100%);
            color: #fff;
        }
        .btn-danger {
            background: linear-gradient(120deg, #e11d48 0%, var(--danger) 100%);
            color: #fff;
        }
        #progress-container {
            width: 100%;
            height: 6px;
            background: #d9e4da;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0f766e, #f39c12);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #d9e4da;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #chat-log {
            max-height: 460px;
            overflow-y: auto;
            word-break: break-word;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: rgba(253, 255, 253, 0.9);
            margin-top: 8px;
        }
        .chat-message {
            margin-bottom: 10px;
            line-height: 1.45;
        }
        .chat-role {
            font-weight: 600;
            color: var(--primary-strong);
        }
        #rag-question-input {
            width: 100%;
            box-sizing: border-box;
            margin-top: 8px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fbfefb;
            font-size: 0.95rem;
        }
        #rag-question-input:focus {
            outline: none;
            border-color: #7fb09a;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }
        #chat-log details summary {
            color: var(--primary-strong);
            text-decoration: underline;
        }
        #chat-log details summary:hover {
            cursor: pointer;
            color: var(--primary);
        }
        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 1180px) {
            .app-shell {
                grid-template-columns: 1fr;
            }
            #sidebar {
                position: static;
                max-height: none;
            }
        }
        @media (max-width: 720px) {
            body {
                padding: 14px;
            }
            .workspace,
            #sidebar {
                padding: 14px;
            }
            #editor {
                min-height: 360px;
                font-size: 1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <section class="workspace">
            <h1>GhostWrite RAG Studio</h1>
            <p class="subtitle">Type in the editor for inline autocomplete, and use RAG chat to ground suggestions in your docs.</p>
            <div id="editor" contenteditable="true" placeholder="Type something..."></div>
        </section>

        <aside id="sidebar">
            <strong class="panel-title">RAG Index Building</strong>
            <button id="select-folder-btn" class="btn btn-neutral">Select Docs Folder</button>
            <p id="folder-status" class="muted-text">No folder selected</p>
            <button id="build-index-btn" class="btn btn-primary" disabled>Build Index</button>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="index-status" class="muted-text"></p>
            <hr class="divider">
            <strong class="panel-title">RAG Chat</strong>
            <div id="chat-log">
                <div class="chat-message"><span class="chat-role">System:</span> Ask a question to retrieve top 2 chunks.</div>
            </div>
            <input id="rag-question-input" type="text" placeholder="Ask a question for retrieval...">
            <button id="ask-rag-btn" class="btn btn-accent">Ask</button>
            <button id="clear-context-btn" class="btn btn-danger">Clear Context</button>
        </aside>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // Global variables to hold our "Index"
        window.model = null;
        window.chunks = [];
        window.embeddings = []; // Our "FAISS" replacement
        window.chunkMeta = []; // Source metadata for each chunk
        window.selectedFolder = null; // Store the selected directory handle

        /**
         * STEP 1A: WALK DIRECTORY RECURSIVELY
         * Recursively iterate all files inside a picked directory
         */
        async function* walkDirectory(directoryHandle) {
            for await (const entry of directoryHandle.values()) {
                if (entry.kind === 'file') {
                    yield entry;
                } else if (entry.kind === 'directory') {
                    yield* walkDirectory(entry);
                }
            }
        }

        /**
         * STEP 1B: EXTRACT DOCX TEXT
         * Extract plain text from a DOCX file (requires Mammoth to be loaded)
         */
        async function extractDocxText(file) {
            const buffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer: buffer });
            return (result.value || '').trim();
        }

        /**
         * STEP 1C: EXTRACT PDF TEXT
         * Note: PDF extraction requires pdf.js library (not currently included)
         * For now, returns empty string if PDF is encountered
         */
        async function extractPdfText(file) {
            // PDF support would require pdf.js library
            console.warn(`PDF files not yet supported: ${file.name}`);
            return '';
        }

        /**
         * STEP 1D: LOAD DOCX & PDF FILES
         * Load text from .docx and .pdf files across one or many folders
         */
        async function load_docx_text(folders = []) {
            const folderList = Array.isArray(folders) ? folders : [folders];
            const fileHandles = [];

            for (const folder of folderList) {
                if (!folder || folder.kind !== 'directory') {
                    continue;
                }

                // Recursively collect supported files
                for await (const fileHandle of walkDirectory(folder)) {
                    const lowerName = fileHandle.name.toLowerCase();
                    if (lowerName.endsWith('.docx') || lowerName.endsWith('.pdf')) {
                        fileHandles.push(fileHandle);
                    }
                }
            }

            console.log(`Found ${fileHandles.length} supported files`);

            const texts = [];
            const meta = [];

            for (const fileHandle of fileHandles) {
                const file = await fileHandle.getFile();
                let text = '';

                // Route to type-specific extractor
                if (file.name.toLowerCase().endsWith('.docx')) {
                    text = await extractDocxText(file);
                } else if (file.name.toLowerCase().endsWith('.pdf')) {
                    text = await extractPdfText(file);
                }

                // Keep only non-empty extracted content
                if (text) {
                    texts.push(text);
                    meta.push({ path: fileHandle.name });
                }
            }

            // Return the same shape: texts + metadata
            return { texts, meta };
        }

        /**
         * STEP 1: LOAD & PARSE DOCX
         * Using Mammoth.js to extract raw text
         */
        async function loadDocx(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer });
            return result.value; // The plain text
        }

        /**
         * STEP 2: CHUNK BY PARAGRAPHS
         * Mirroring your Python logic with overlap
         */
        function chunkText(text, maxChars = 800, overlapChars = 150) {
            const result = [];
            let start = 0;
            
            while (start < text.length) {
                let end = start + maxChars;
                result.push(text.substring(start, end).trim());
                start = end - overlapChars; // The overlap
                if (start >= text.length - overlapChars) break;
            }
            return result;
        }
        
        /**
         * STEP 3: CHUNK BY PARAGRAPHS (Mirroring Python logic)
         */
        function chunkByParagraphs(text, maxChars = 1200, overlapParas = 1) {
            const paras = text.split('\n').map(p => p.trim()).filter(p => p.length > 0);
            const result = [];
            let buf = [];
            let bufLen = 0;

            for (let p of paras) {
                if (bufLen + p.length + 1 <= maxChars) {
                    buf.push(p);
                    bufLen += p.length + 1;
                } else {
                    if (buf.length > 0) {
                        result.push(buf.join('\n'));
                    }
                    // overlap last N paragraphs
                    buf = buf.slice(-overlapParas).concat([p]);
                    bufLen = buf.reduce((sum, x) => sum + x.length + 1, 0);

                    // guard: paragraph larger than max_chars
                    if (bufLen > maxChars && buf.length === 1) {
                        result.push(buf[0]);
                        buf = [];
                        bufLen = 0;
                    }
                }
            }

            if (buf.length > 0) {
                result.push(buf.join('\n'));
            }

            return result;
        }

        /**
         * STEP 4: BUILD INDEX (The Ingestion Pipeline)
         * This turns text into numbers (Vectors)
         */
        async function buildIndex() {
            if (!window.selectedFolder) {
                alert('Please select a folder first!');
                return;
            }

            const statusEl = document.getElementById('index-status');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            statusEl.innerText = 'Loading files...';
            progressContainer.style.display = 'block';
            progressBar.style.width = '5%';

            try {
                // Use load_docx_text to get all texts and metadata from the folder
                const { texts, meta } = await load_docx_text(window.selectedFolder);
                
                if (texts.length === 0) {
                    statusEl.innerText = 'No DOCX/PDF files found!';
                    progressContainer.style.display = 'none';
                    return;
                }

                statusEl.innerHTML = `<span class="spinner"></span>Found ${texts.length} file(s). Chunking...`;
                progressBar.style.width = '15%';

                // Chunk per document so we can keep source mapping
                window.chunks = [];
                window.chunkMeta = [];
                for (let docIndex = 0; docIndex < texts.length; docIndex++) {
                    const docChunks = chunkByParagraphs(texts[docIndex], 1200, 1);
                    window.chunks.push(...docChunks);
                    for (let j = 0; j < docChunks.length; j++) {
                        window.chunkMeta.push({
                            path: meta[docIndex]?.path || 'unknown',
                            docIndex,
                            chunkInDoc: j
                        });
                    }
                }

                statusEl.innerHTML = `<span class="spinner"></span>Loaded ${texts.length} file(s), ${window.chunks.length} chunks. Loading model...`;
                progressBar.style.width = '25%';

                // Load embedding model if not already loaded
                if (!window.model) {
                    window.model = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                }

                progressBar.style.width = '35%';
                statusEl.innerHTML = `<span class="spinner"></span>Vectorizing ${window.chunks.length} chunks...`;
                
                // Generate Embeddings (The "FAISS" part)
                window.embeddings = [];
                for (let i = 0; i < window.chunks.length; i++) {
                    const chunk = window.chunks[i];
                    const output = await window.model(chunk, { pooling: 'mean', normalize: true });
                    window.embeddings.push(Object.values(output.data));
                    
                    // Update progress bar: 35% + (65% * progress)
                    const progress = 35 + (65 * (i + 1) / window.chunks.length);
                    progressBar.style.width = progress + '%';
                    
                    // Update text every 5 chunks
                    if ((i + 1) % 5 === 0) {
                        statusEl.innerHTML = `<span class="spinner"></span>Vectorizing ${i + 1}/${window.chunks.length} chunks...`;
                    }
                }

                progressBar.style.width = '100%';
                statusEl.innerText = `✅ Index ready! ${window.chunks.length} chunks indexed.`;
                console.log('Index Build Complete!');
                
                // Hide progress bar after 2 seconds
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.style.width = '0%';
                }, 2000);
            } catch (error) {
                statusEl.innerText = `❌ Error: ${error.message}`;
                console.error('Build index error:', error);
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';
            }
        }

        // Event listener for folder selection
        document.getElementById('select-folder-btn').addEventListener('click', async () => {
            try {
                window.selectedFolder = await window.showDirectoryPicker();
                document.getElementById('folder-status').innerText = `📂 ${window.selectedFolder.name}`;
                document.getElementById('build-index-btn').disabled = false;
            } catch (error) {
                console.log('Folder selection cancelled or failed:', error);
            }
        });

        // Event listener for build index button
        document.getElementById('build-index-btn').addEventListener('click', buildIndex);


    </script>

    <script>

        // Simple in-memory semantic cache
        const semanticCache = {
            lastQueryVector: null,
            lastResults: null,
            lastTopResults: null,
            threshold: 0.8 // Cosine similarity threshold for cache hit
        };

        window.cachedAnswers = [];

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function appendChatMessage(role, htmlText) {
            const chatLog = document.getElementById('chat-log');
            const row = document.createElement('div');
            row.className = 'chat-message';
            row.innerHTML = `<span class="chat-role">${escapeHtml(role)}:</span> ${htmlText}`;
            chatLog.appendChild(row);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function addAnswerToCache(question, answer, topResults) {
            window.cachedAnswers.push({
                question,
                answer,
                sources: (topResults || []).slice(0, 2).map((r, i) => ({
                    i,
                    path: r.path || 'unknown',
                    idx: r.idx,
                    score: r.score
                }))
            });
        }

        window.getCachedResearchContext = function() {
            if (!window.cachedAnswers || window.cachedAnswers.length === 0) {
                return '';
            }
            return window.cachedAnswers.map(a => a.answer).join("\n---\n");
        };

        function renderTopTwoChunksInChat(question, topResults, cached = false) {
            const debugInput = escapeHtml((question || '').trim() || '(empty)');
            appendChatMessage('You', debugInput);

            if (!topResults || topResults.length === 0) {
                appendChatMessage('RAG', 'No relevant chunks retrieved.');
                return;
            }

            const lines = topResults.slice(0, 2).map(r => {
                const fullText = escapeHtml(r.text || '');
                const source = escapeHtml(r.path || 'unknown');
                return `<div>[chunk ${r.idx}] score=${r.score.toFixed(3)}<br><small>${source}</small><br>${fullText}</div>`;
            }).join('<hr style="margin: 6px 0;">');

            const cacheTag = cached ? ' (cached)' : '';
            appendChatMessage(
                'RAG',
                `<b>Retrieved top 2 chunks${cacheTag}.</b><br>
                <details>
                    <summary>Show context</summary>
                    <div style="margin-top: 6px;">${lines}</div>
                </details>`
            );
        }

        async function answerFromRetrievedChunks(question, topResults) {
            const selected = (topResults || []).slice(0, 2);
            if (selected.length === 0) {
                return 'Not found in the provided documents.';
            }

            const context = selected.map((r, i) => {
                const src = r.path || 'unknown';
                return `[${i}] (${src})\n${r.text}`;
            }).join('\n\n');

            const prompt = [
                'You are a RAG assistant. You MUST answer using ONLY the provided context. If the answer is not in the context, say: Not found in the provided documents.',
                'Cite sources using square brackets like [0], [1].',
                '',
                'Context:',
                context,
                '',
                'Question:',
                question,
                '',
                'Answer:'
            ].join('\n');

            const response = await fetch('http://localhost:11434/api/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'qwen2.5-coder:3b',
                    prompt,
                    stream: false,
                    options: {
                        temperature: 0.2,
                        num_predict: 256
                    }
                })
            });

            const data = await response.json();
            return (data.response || '').trim() || 'Not found in the provided documents.';
        }

        function cosineSimilarity(vecA, vecB) {
            return vecA.reduce((sum, a, i) => sum + a * vecB[i], 0);
        }

        // --- EXPOSE RETRIEVAL TO WINDOW ---
        window.retrieveRelevantChunks = async function(userInput) {
            if (!window.model || window.chunks.length === 0) return "";

            // 1. Vectorize query
            const output = await window.model(userInput, { pooling: 'mean', normalize: true });
            const queryVector = Object.values(output.data);

            // 2. Semantic Cache Check
            if (semanticCache.lastQueryVector) {
                const sim = cosineSimilarity(queryVector, semanticCache.lastQueryVector);
                if (sim > semanticCache.threshold) {
                    console.log("⚡ Semantic Cache Hit:", sim.toFixed(4));
                    return { topResults: semanticCache.lastTopResults || [], cached: true };
                }
            }

            // 3. Search Index
            const scored = window.chunks.map((text, i) => ({
                idx: i,
                text,
                path: window.chunkMeta[i]?.path,
                score: cosineSimilarity(queryVector, window.embeddings[i])
            }));

            const topResults = scored
                .sort((a, b) => b.score - a.score)
                .filter(r => r.score > 0.01); // Relevancy threshold

            // 4. Update Cache
            semanticCache.lastQueryVector = queryVector;
            semanticCache.lastResults = topResults.slice(0, 2).map(r => r.text).join("\n---\n");
            semanticCache.lastTopResults = topResults;

            return { topResults, cached: false };
        };

        document.getElementById('ask-rag-btn').addEventListener('click', async () => {
            const inputEl = document.getElementById('rag-question-input');
            const question = (inputEl.value || '').trim();
            if (!question) {
                return;
            }

            if (!window.model || !window.chunks || window.chunks.length === 0) {
                appendChatMessage('System', 'Build the index first before asking questions.');
                return;
            }

            const { topResults, cached } = await window.retrieveRelevantChunks(question);
            const llmAnswer = await answerFromRetrievedChunks(question, topResults || []);
            renderTopTwoChunksInChat(question, topResults || [], cached);
            appendChatMessage('Answer', escapeHtml(llmAnswer));
            addAnswerToCache(question, llmAnswer, topResults || []);
            inputEl.value = '';
        });

        document.getElementById('rag-question-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('ask-rag-btn').click();
            }
        });

        document.getElementById('clear-context-btn').addEventListener('click', () => {
            window.cachedAnswers = [];
            semanticCache.lastQueryVector = null;
            semanticCache.lastResults = null;
            semanticCache.lastTopResults = null;
            const chatLog = document.getElementById('chat-log');
            chatLog.innerHTML = '<div class="chat-message"><span class="chat-role">System:</span> Context cache cleared.</div>';
        });

    
    </script>

    
    <script>

        // Ghost Text Autocomplete
        const editor = document.getElementById('editor');
        let timer;
        let currentGhostSpan = null;
        let requestVersion = 0;

        function autoResizeEditor() {
            editor.style.height = 'auto';
            editor.style.height = Math.min(editor.scrollHeight, 500) + 'px';
        }

        function removeGhostSpan() {
            if (currentGhostSpan && currentGhostSpan.isConnected) {
                currentGhostSpan.remove();
            }
            currentGhostSpan = null;
        }

        function getCaretCharacterOffsetWithin(element) {
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) {
                return 0;
            }

            const range = selection.getRangeAt(0).cloneRange();
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(element);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            return preCaretRange.toString().length;
        }

        function getTrailingWordFragment(text) {
            const match = text.match(/[A-Za-z0-9_]+$/);
            return match ? match[0] : '';
        }

        function stripDuplicateStart(suggestion, fragment) {
            if (!fragment) {
                return suggestion;
            }

            if (suggestion.toLowerCase().startsWith(fragment.toLowerCase())) {
                return suggestion.slice(fragment.length);
            }

            return suggestion;
        }

        function stripPrefixOverlapWithSuffix(suggestion, suffixText) {
            if (!suggestion || !suffixText) {
                return suggestion;
            }

            const maxOverlap = Math.min(suggestion.length, suffixText.length);
            for (let overlap = maxOverlap; overlap > 0; overlap -= 1) {
                const start = suggestion.slice(0, overlap).toLowerCase();
                const suffixStart = suffixText.slice(0, overlap).toLowerCase();
                if (start === suffixStart) {
                    return suggestion.slice(overlap);
                }
            }

            return suggestion;
        }

        function isEditorEffectivelyEmpty() {
            const text = (editor.innerText || '').replace(/\u200B/g, '').trim();
            return text.length === 0;
        }

        function scheduleGhostSuggestion() {
            clearTimeout(timer);

            if (isEditorEffectivelyEmpty()) {
                removeGhostSpan();
                return;
            }

            const currentRequestVersion = ++requestVersion;

            timer = setTimeout(async () => {

                // Delete existing ghost text before making a new API call
                removeGhostSpan();

                // Check if selection is still in the editor
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) {
                    return;
                }
                // Ensure the selection is still within the editor
                if (!editor.contains(selection.anchorNode)) {
                    return;
                }

                const fullText = editor.innerText;
                if (!fullText || fullText.trim().length === 0) {
                    return;
                }
                const cursorPos = getCaretCharacterOffsetWithin(editor);
                const textBefore = fullText.substring(0, cursorPos);
                const textAfter = fullText.substring(cursorPos);
                const trailingFragment = getTrailingWordFragment(textBefore);
                
                // Use accumulated cache chunks from chat retrieval as RAG context.
                const researchContext = window.getCachedResearchContext();

                const prompt = [    
                    'You are an AUTOCOMPLETER.',
                    'Task: Fill the missing text between PREFIX and SUFFIX at the cursor position.',
                    'Use the following RESEARCH CONTEXT to inform your suggestion if relevant:',
                    `RESEARCH CONTEXT: ${researchContext}`, // This is the RAG part!
                    '',
                    'Rules:',
                    '- Return only the inserted text (no explanation).',
                    '- Keep tone, tense, and style consistent.',
                    '- If needed, start a new sentence and use correct punctuation.',
                    '- If PREFIX ends with an unfinished word, continue that same word first.',
                    '- Do not repeat text already present in PREFIX or SUFFIX.',
                    '',
                    '<PREFIX>',
                    textBefore,
                    '</PREFIX>',
                    '',
                    '<SUFFIX>',
                    textAfter,
                    '</SUFFIX>',
                    '',
                    '<COMPLETION>'
                ].join('\n');

                // 1. Send BOTH before and after as context
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "qwen2.5-coder:3b",
                        prompt,
                        stream: false,
                        options: {
                            temperature: 0.2,
                            num_predict: 32,
                            stop: ["\n\n"]
                        }
                    })
                });

                const data = await response.json();
                if (currentRequestVersion !== requestVersion) {
                    return;
                }

                let suggestion = (data.response || '').trim();
                suggestion = stripDuplicateStart(suggestion, trailingFragment);
                suggestion = stripPrefixOverlapWithSuffix(suggestion, textAfter).trimStart();
                if (!suggestion) {
                    return;
                }

                const suggestionSpan = document.createElement('span');
                suggestionSpan.id = 'ghost-span';
                suggestionSpan.style.color = 'gray';
                suggestionSpan.style.fontStyle = 'italic';
                suggestionSpan.contentEditable = 'false';
                suggestionSpan.innerText = suggestion;
                currentGhostSpan = suggestionSpan;

                // 2. Insert suggestion text directly into the editor without replacing everythig
                // Get cursor position and insert the ghost text there
                const range = selection.getRangeAt(0);
                range.insertNode(suggestionSpan);

                // Keep caret at the typing position (before ghost text).
                const caretRange = document.createRange();
                caretRange.setStartBefore(suggestionSpan);
                caretRange.collapse(true);
                selection.removeAllRanges();
                selection.addRange(caretRange);
            }, 1000);
        }

        editor.addEventListener('input', () => {
            // Remove ghost text immediately when the user types.
            removeGhostSpan();
            autoResizeEditor();

            if (isEditorEffectivelyEmpty()) {
                return;
            }

            scheduleGhostSuggestion();
        });

        // Remove current ghost text and suggest again at clicked caret position.
        editor.addEventListener('click', () => {
            removeGhostSpan();
            scheduleGhostSuggestion();
        });

        // Accept ghost text on Tab key press
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault(); // Prevent default tab behavior (focus change)

                const ghostSpan = currentGhostSpan;
                if (ghostSpan) {
                    const ghostText = ghostSpan.innerText;
                    // Replace ghost text with normal text (remove the gray styling)
                    const textNode = document.createTextNode(ghostText);
                    ghostSpan.replaceWith(textNode); // Replace the ghost span with actual text
                    currentGhostSpan = null;
                    autoResizeEditor();
                    // Move cursor to the end of the newly inserted text
                    const selection = window.getSelection();
                    const range = document.createRange();
                    range.setStartAfter(textNode);
                    range.setEndAfter(textNode);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }
        });
    </script>
</body>
